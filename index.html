<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分期試算工具</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #047857;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
        "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    select,
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.15s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .summary {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #fafafa;
      border-radius: 14px;
      font-size: 14px;
      color: var(--text);
    }

    .summary strong {
      color: var(--success);
    }

    .error {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      border-radius: 14px;
      color: var(--danger);
      font-size: 14px;
      display: none;
    }

    .table-wrap {
      margin-top: 18px;
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      background: #f3f4f6;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-size: 14px;
      vertical-align: middle;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      padding-left: 14px;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      margin-left: 6px;
    }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>分期試算工具</h1>
      <p class="sub">
        請先選擇專案，再輸入「萬」為單位的貸款金額。<span class="tag">例如 100 = 100萬</span>
      </p>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="field">
          <label for="project">選擇專案</label>
          <select id="project">
            <option value="haoxiang">豪享專案</option>
            <option value="lexiang">樂享專案</option>
            <option value="legou">樂購專案</option>
            <option value="zhonggui">中古尊榮</option>
          </select>
        </div>

        <div class="field">
          <label for="loanWan">貸款金額（萬）</label>
          <input id="loanWan" type="number" min="0" step="0.1" value="100" placeholder="例如：100" />
        </div>

        <button class="btn" id="calcBtn">開始試算</button>
      </div>

      <div class="hint">
        這個版本是依照你提供的 Excel 邏輯做前端試算，先用最簡單的方式把表格算出來。
      </div>

      <div id="summary" class="summary"></div>
      <div id="errorBox" class="error"></div>

      <div class="table-wrap" id="tableWrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="note" id="note"></div>
    </div>
  </div>

  <script>
    // ========= 基本財務函數：模擬 Excel 的 FV / PV / PMT =========
    function fv(rate, nper, pmt, pv = 0, type = 0) {
      if (Math.abs(rate) < 1e-12) {
        return -(pv + pmt * nper);
      }
      return -(
        pv * Math.pow(1 + rate, nper) +
        pmt * (1 + rate * type) * ((Math.pow(1 + rate, nper) - 1) / rate)
      );
    }

    function pv(rate, nper, pmt, fvValue = 0, type = 0) {
      if (Math.abs(rate) < 1e-12) {
        return -(fvValue + pmt * nper);
      }
      return -(
        fvValue +
        pmt * (1 + rate * type) * ((Math.pow(1 + rate, nper) - 1) / rate)
      ) / Math.pow(1 + rate, nper);
    }

    function pmt(rate, nper, pvValue, fvValue = 0, type = 0) {
      if (Math.abs(rate) < 1e-12) {
        return -(fvValue + pvValue) / nper;
      }
      return -(
        rate * (fvValue + pvValue * Math.pow(1 + rate, nper))
      ) / (
        (1 + rate * type) * ((Math.pow(1 + rate, nper) - 1))
      );
    }

    // ========= 工具函數 =========
    function roundUpInteger(n) {
      return Math.ceil(n - 1e-10);
    }

    function roundUpTo10(n) {
      return Math.ceil((n - 1e-10) / 10) * 10;
    }

    function formatMoney(value) {
      if (typeof value !== "number" || !isFinite(value)) return String(value);
      return value.toLocaleString("zh-Hant-TW");
    }

    function formatPercent(rate) {
      return rate.toFixed(2) + "%";
    }

    function moneyText(value) {
      return "$" + formatMoney(value);
    }

    function actualLoanFromWan(wan) {
      return Math.round(wan * 10000);
    }

    function getCommissionCommon(rate, loan) {
      // 豪享 / 樂享 / 樂購 共用
      // 3.99%：8000；若貸款金額 >= 150萬，改 10000
      // 4.25%：15000
      if (Math.abs(rate - 3.99) < 1e-9) {
        return loan >= 1500000 ? 10000 : 8000;
      }
      if (Math.abs(rate - 4.25) < 1e-9) {
        return 15000;
      }
      return 0;
    }

    function getCommissionZhonggui(rate, loan) {
      // IF(OR(貸款金額<1000000,利率<4.5),0,IF(利率>=4.75,15000,IF(AND(貸款金額>=1500000,利率>=4.5),10000,8000)))
      if (loan < 1000000 || rate < 4.5) return 0;
      if (rate >= 4.75) return 15000;
      if (loan >= 1500000 && rate >= 4.5) return 10000;
      return 8000;
    }

    function getZhongguiFirst12(loan) {
      if (loan < 1000000 || loan > 5000000) return null;

      if (loan < 1600000) return 8888;
      if (loan < 2100000) return 12888;
      if (loan < 2600000) return 16888;
      if (loan < 3100000) return 20888;
      if (loan < 3600000) return 24888;
      if (loan < 4100000) return 28888;
      if (loan < 4600000) return 32888;
      if (loan <= 5000000) return 36888;
      return null;
    }

    function clearTable() {
      document.getElementById("tableHead").innerHTML = "";
      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("summary").innerHTML = "";
      document.getElementById("errorBox").style.display = "none";
      document.getElementById("errorBox").innerText = "";
      document.getElementById("note").innerText = "";
    }

    function showError(msg) {
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "block";
      errorBox.innerText = msg;
    }

    function setSummary(projectName, loanWan, loanActual) {
      document.getElementById("summary").innerHTML = `
        <strong>${projectName}</strong><br>
        輸入金額：${loanWan} 萬<br>
        實際貸款金額：${moneyText(loanActual)}
      `;
    }

    function buildTable(headers, rows) {
      const thead = document.getElementById("tableHead");
      const tbody = document.getElementById("tableBody");

      thead.innerHTML = `
        <tr>
          ${headers.map(h => `<th>${h}</th>`).join("")}
        </tr>
      `;

      tbody.innerHTML = rows.map(row => `
        <tr>
          ${row.map(cell => `<td>${cell}</td>`).join("")}
        </tr>
      `).join("");
    }

    // ========= 各專案計算 =========
    function calcHaoxiang(loan) {
      const rates = [3.99, 4.25];
      const rows = rates.map(rate => {
        const r = rate / 100 / 12;
        const p1 = 8888;
        const p2 = loan / 100 + 888;
        const fv1 = fv(r, 12, p1, -loan);
        const fv2 = fv(r, 12, p2, -fv1);
        const p3 = roundUpInteger(pmt(r, 35, -fv2, loan * 0.5 / (1 + r)));
        const tail = loan * 0.5;
        const commission = getCommissionCommon(rate, loan);

        return [
          moneyText(loan),
          "60",
          moneyText(p1),
          moneyText(p2),
          moneyText(p3),
          moneyText(tail),
          moneyText(commission),
          formatPercent(rate)
        ];
      });

      return {
        headers: ["分期金額", "期數", "1~12期", "13~24期", "25~59期", "尾款(50%)", "佣金", "客戶利率"],
        rows
      };
    }

    function calcLexiang(loan) {
      const rates = [3.99, 4.25];
      const rows = rates.map(rate => {
        const r = rate / 100 / 12;
        const p1 = 8888;
        const p2 = loan / 100 + 888;
        const fv1 = fv(r, 12, p1, -loan);
        const fv2 = fv(r, 47, p2, -fv1);
        const p60 = roundUpInteger(pmt(r, 1, -fv2));
        const commission = getCommissionCommon(rate, loan);

        return [
          moneyText(loan),
          "60",
          moneyText(p1),
          moneyText(p2),
          moneyText(p60),
          moneyText(commission),
          formatPercent(rate)
        ];
      });

      return {
        headers: ["貸款金額", "期數", "1~12期", "13~59期", "60期", "佣金", "客戶利率"],
        rows
      };
    }

    function calcLegou(loan) {
      const rates = [3.99, 4.25];
      const rows = rates.map(rate => {
        const r = rate / 100 / 12;
        const p1 = loan / 100;
        const fv1 = fv(r, 59, p1, -loan);
        const p60 = roundUpInteger(pmt(r, 1, -fv1));
        const commission = getCommissionCommon(rate, loan);

        return [
          moneyText(loan),
          "60",
          moneyText(p1),
          moneyText(p60),
          moneyText(commission),
          formatPercent(rate)
        ];
      });

      return {
        headers: ["貸款金額", "期數", "1~59期", "60期", "佣金", "客戶利率"],
        rows
      };
    }

    function calcZhonggui(loan) {
      const rates = [4.50, 4.75, 5.00, 5.25, 5.50, 5.75];
      const p1 = getZhongguiFirst12(loan);

      if (p1 === null) {
        return {
          error: "中古尊榮的貸款金額範圍為 100萬～500萬。請先調整後再試算。",
          headers: [],
          rows: []
        };
      }

      const rows = rates.map(rate => {
        const r = rate / 100 / 12;
        const p2 = loan / 100 + 888;
        const tail = loan * 0.5;

        const fv1 = fv(r, 12, p1, -loan);
        const fv2 = fv(r, 12, p2, -fv1);
        const tailPV = -pv(r, 1, tail, 0);
        const p3 = roundUpTo10(pmt(r, 35, -fv2, tailPV));
        const commission = getCommissionZhonggui(rate, loan);

        return [
          formatPercent(rate).replace(".00%", "%"),
          moneyText(loan),
          moneyText(p1),
          moneyText(p2),
          moneyText(p3),
          moneyText(tail),
          moneyText(commission)
        ];
      });

      return {
        headers: ["利率", "貸款金額", "1~12期", "13~24期", "25~59期", "尾款", "佣金"],
        rows
      };
    }

    function render() {
      clearTable();

      const project = document.getElementById("project").value;
      const loanWan = parseFloat(document.getElementById("loanWan").value);

      if (!isFinite(loanWan) || loanWan <= 0) {
        showError("請輸入正確的貸款金額（萬）。例如：100 代表 100 萬。");
        return;
      }

      const loan = actualLoanFromWan(loanWan);

      const projectNameMap = {
        haoxiang: "豪享專案",
        lexiang: "樂享專案",
        legou: "樂購專案",
        zhonggui: "中古尊榮"
      };

      setSummary(projectNameMap[project] || "方案", loanWan, loan);

      let result;
      let note = "";

      if (project === "haoxiang") {
        result = calcHaoxiang(loan);
        note = "說明：此專案依你提供的 Excel 邏輯，會自動列出 3.99% 與 4.25% 兩種結果。";
      } else if (project === "lexiang") {
        result = calcLexiang(loan);
        note = "說明：此專案依你提供的 Excel 邏輯，會自動列出 3.99% 與 4.25% 兩種結果。";
      } else if (project === "legou") {
        result = calcLegou(loan);
        note = "說明：此專案依你提供的 Excel 邏輯，會自動列出 3.99% 與 4.25% 兩種結果。";
      } else if (project === "zhonggui") {
        result = calcZhonggui(loan);
        if (result.error) {
          showError(result.error);
          return;
        }
        note = "說明：中古尊榮會自動列出 4.50%～5.75% 的多種利率結果，且 25~59 期採十位數無條件進位。";
      }

      buildTable(result.headers, result.rows);
      document.getElementById("note").innerText = note;
    }

    // ========= 事件綁定 =========
    document.getElementById("calcBtn").addEventListener("click", render);
    document.getElementById("project").addEventListener("change", render);
    document.getElementById("loanWan").addEventListener("input", render);

    // 預設載入時先算一次
    render();
  </script>
</body>
</html>
