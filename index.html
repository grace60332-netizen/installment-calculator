<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分期試算工具</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --warn: #b45309;
      --warn-bg: #fffbeb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      padding: 20px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .field small {
      display: block;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
    }

    select,
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      appearance: none;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .ghost {
      background: #e5e7eb;
      color: #111827;
    }

    .ghost:hover {
      background: #d1d5db;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
    }

    .meta strong {
      color: var(--text);
    }

    .notice {
      background: var(--warn-bg);
      border: 1px solid #fde68a;
      color: var(--warn);
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.7;
      margin-top: 12px;
      display: none;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 26px 10px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 700;
      font-size: 13px;
      margin-left: 8px;
      vertical-align: middle;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">分期試算工具</h1>
    <p class="subtitle">
      請先選擇專案，再輸入貸款金額（單位：<strong>萬</strong>）。<br />
    </p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="project">選擇專案</label>
          <select id="project">
            <option value="haoxiang">豪享專案</option>
            <option value="lexiang">樂享專案</option>
            <option value="legou">樂購專案</option>

        <div 
          class="field"

        <label for="toyotaPlan">

        Toyota方案

        </label>

        </div>

        <div class="field">
          <label for="amountWan">貸款金額（萬）</label>
          <input
            id="amountWan"
            type="number"

            max="500"

      </div>

      <div class="actions">
        <button id="calcBtn">立即試算</button>
        <button id="resetBtn" class="ghost">重設</button>
      </div>

      <div class="meta" id="summary"></div>
      <div class="notice" id="notice"></div>
    </div>

    <div class="card">
      <div class="table-wrap" id="tableWrap">
      </div>
    </div>
  </div>

  <script>

    const toyotaPlans=[

    const projectSelect = document.getElementById("project");

    function initToyotaPlans(){
    toyotaPlan.innerHTML="";
    toyotaPlans.forEach(plan=>{
    const option=document.createElement("option");
    option.value=plan.name;
    option.textContent=plan.name;

    }
    function formatMoney(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      return "$" + moneyFormatter.format(Math.round(value));
    }

    function formatPercent(rate) {
      return rate.toFixed(2) + "%";
    }

    // Excel 的 ROUNDUP
    // digits = 0：進位到整數
    // digits = -1：進位到十位數
    function roundUp(value, digits = 0) {
      if (!isFinite(value)) return NaN;
      if (digits >= 0) {
        const factor = Math.pow(10, digits);
        return Math.ceil(value * factor) / factor;
      }
      const factor = Math.pow(10, -digits);
      return Math.ceil(value / factor) * factor;
    }

    // Excel PMT 公式（保留 Excel 常見的正負號邏輯）
    function pmt(rate, nper, pv, fv = 0, type = 0) {
      if (rate === 0) {
        return -(fv + pv) / nper;
      }
      const pow = Math.pow(1 + rate, nper);
      return -(rate * (fv + pv * pow)) / ((1 + rate * type) * (pow - 1));
    }
    function roundToNearest(value, step) {
  return Math.round(value / step) * step;
}

function pv(rate, nper, pmtValue, fv = 0, type = 0) {
  if (rate === 0) {
    return -(fv + pmtValue * nper);
  }
  const pow = Math.pow(1 + rate, nper);
  return -(
    fv +
    pmtValue * (1 + rate * type) * (pow - 1) / rate
  ) / pow;
}

// 用二分法找 RATE
function rate(nper, pmtValue, pvValue, fv = 0, type = 0) {
  const f = (r) => {
    if (Math.abs(r) < 1e-12) {
      return pvValue + pmtValue * nper + fv;
    }
    const pow = Math.pow(1 + r, nper);
    return pvValue * pow + pmtValue * (1 + r * type) * (pow - 1) / r + fv;
  };

  let lo = -0.9999;
  let hi = 1;
  let flo = f(lo);
  let fhi = f(hi);

  while (flo * fhi > 0 && hi < 100) {
    hi *= 2;
    fhi = f(hi);
  }

  if (flo * fhi > 0) return NaN;

  for (let i = 0; i < 100; i++) {
    const mid = (lo + hi) / 2;
    const fmid = f(mid);

    if (Math.abs(fmid) < 1e-12) return mid;

    if (flo * fmid <= 0) {
      hi = mid;
      fhi = fmid;
    } else {
      lo = mid;
      flo = fmid;
    }
  }

  return (lo + hi) / 2;
}

    // 用固定月付逐月推進餘額
    function evolveBalance(balance, monthlyRate, months, payment) {
      let b = balance;
      for (let i = 0; i < months; i++) {
        b = b * (1 + monthlyRate) - payment;
      }
      return b;
    }

    function commissionShared(loan, rate) {
      if (rate === 3.99) {
        return loan >= 1500000 ? 10000 : 8000;
      }
      if (rate === 4.25) {
        return 15000;
      }
      return 0;
    }

    function commissionZhonggu(loan, rate) {
      if (loan < 1000000 || rate < 4.5) return 0;
      if (rate >= 4.75) return 15000;
      if (loan >= 1500000 && rate >= 4.5) return 10000;
      return 8000;
    }

    // 豪享 / 樂享 / 樂購 共用的 1~12 期基礎表
    function basePayment1to12Standard(loan) {
      if (loan < 1000000 || loan > 5000000) return null;

      if (loan >= 5000000) return 31888;
      if (loan >= 4500000) return 28888;
      if (loan >= 4000000) return 25888;
      if (loan >= 3500000) return 22888;
      if (loan >= 3000000) return 19888;
      if (loan >= 2500000) return 16888;
      if (loan >= 2000000) return 14888;
      if (loan >= 1500000) return 12888;
      return 8888;
    }

    // 中古尊榮的 1~12 期基礎表
    function basePayment1to12Zhonggu(loan) {
      if (loan < 1000000 || loan > 5000000) return null;

      if (loan >= 4600000) return 36888;
      if (loan >= 4100000) return 32888;
      if (loan >= 3600000) return 28888;
      if (loan >= 3100000) return 24888;
      if (loan >= 2600000) return 20888;
      if (loan >= 2100000) return 16888;
      if (loan >= 1600000) return 12888;
      return 8888;
    }

    function commonLoanText(loan) {
      return formatMoney(loan);
    }

    function renderTable(headers, rows) {
      const thead = `
        <thead>
          <tr>
            ${headers.map(h => `<th>${h}</th>`).join("")}
          </tr>
        </thead>
      `;

      const tbody = rows.length
        ? `
          <tbody>
            ${rows.map(row => `
              <tr>
                ${row.map(cell => `<td>${cell}</td>`).join("")}
              </tr>
            `).join("")}
          </tbody>
        `
        : `<tbody><tr><td class="empty" colspan="${headers.length}">沒有可顯示的資料</td></tr></tbody>`;

      tableWrap.innerHTML = `<table>${thead}${tbody}</table>`;
    }

    function setNotice(message, show = false) {
      notice.textContent = message;
      notice.style.display = show ? "block" : "none";
    }

    function getProjectConfig(key) {
      const projectMap = {
        haoxiang: {
          name: "豪享專案",
          hint: "固定顯示 3.99% 與 4.25% 兩種利率；期數固定為 60 期。",
          headers: ["貸款金額", "期數", "1~12期", "13~24期", "25~59期", "尾款(50%)", "佣金", "客戶利率"],
          rates: [3.99, 4.25],
          buildRows: (loan) => {
            const p1 = basePayment1to12Standard(loan);
            const p2 = loan / 100 + 888;
            const tail = loan * 0.5;

            return [3.99, 4.25].map(rate => {
              const r = rate / 100 / 12;
              const balance12 = evolveBalance(loan, r, 12, p1);
              const balance24 = evolveBalance(balance12, r, 12, p2);
              const p3 = roundUp(pmt(r, 35, -balance24, tail / (1 + r)), 0);
              const comm = commissionShared(loan, rate);

              return [
                commonLoanText(loan),
                "60",
                formatMoney(p1),
                formatMoney(p2),
                formatMoney(p3),
                formatMoney(tail),
                formatMoney(comm),
                formatPercent(rate)
              ];
            });
          }
        },

        lexiang: {
          name: "樂享專案",
          hint: "固定顯示 3.99% 與 4.25% 兩種利率；期數固定為 60 期。",
          headers: ["貸款金額", "期數", "1~12期", "13~59期", "60期", "佣金", "客戶利率"],
          rates: [3.99, 4.25],
          buildRows: (loan) => {
            const p1 = basePayment1to12Standard(loan);
            const p2 = loan / 100 + 888;

            return [3.99, 4.25].map(rate => {
              const r = rate / 100 / 12;

              // 先跑完前 12 期，再跑 13~59 期，最後算第 60 期一次清償金額
              const balance12 = evolveBalance(loan, r, 12, p1);
              const balance59 = evolveBalance(balance12, r, 47, p2);
              const p60 = roundUp(balance59 * (1 + r), 0);
              const comm = commissionShared(loan, rate);

              return [
                commonLoanText(loan),
                "60",
                formatMoney(p1),
                formatMoney(p2),
                formatMoney(p60),
                formatMoney(comm),
                formatPercent(rate)
              ];
            });
          }
        },

        legou: {
          name: "樂購專案",
          hint: "固定顯示 3.99% 與 4.25% 兩種利率；期數固定為 60 期。",
          headers: ["貸款金額", "期數", "1~59期", "60期", "佣金", "客戶利率"],
          rates: [3.99, 4.25],
          buildRows: (loan) => {
            const p1 = loan / 100;

            return [3.99, 4.25].map(rate => {
              const r = rate / 100 / 12;
              const balance59 = evolveBalance(loan, r, 59, p1);
              const p60 = roundUp(balance59 * (1 + r), 0);
              const comm = commissionShared(loan, rate);

              return [
                commonLoanText(loan),
                "60",
                formatMoney(p1),
                formatMoney(p60),
                formatMoney(comm),
                formatPercent(rate)
              ];
            });
          }
        },

        zhonggu: {
          name: "中古尊榮",
          hint: "固定顯示 4.50% ～ 5.75% 的多個利率；佣金會依金額與利率條件變動。",
          headers: ["利率", "貸款金額", "1~12期", "13~24期", "25~59期", "尾款", "佣金"],
          rates: [4.50, 4.75, 5.00, 5.25, 5.50, 5.75],
          buildRows: (loan) => {
            const p1 = basePayment1to12Zhonggu(loan);
            const p2 = loan / 100 + 888;
            const tail = loan * 0.5;

            return [4.50, 4.75, 5.00, 5.25, 5.50, 5.75].map(rate => {
              const r = rate / 100 / 12;
              const balance12 = evolveBalance(loan, r, 12, p1);
              const balance24 = evolveBalance(balance12, r, 12, p2);
              const p3 = roundUp(
                pmt(r, 35, -balance24, tail / (1 + r)),
                -1
              );
              const comm = commissionZhonggu(loan, rate);

              return [
                formatPercent(rate),
                commonLoanText(loan),
                formatMoney(p1),
                formatMoney(p2),
                formatMoney(p3),
                formatMoney(tail),
                formatMoney(comm)
              ];
            });
          }
        }
      };

      return projectMap[key];
    }
function calculateToyota() {
  const selectedPlan = toyotaPlans.find(plan => plan.name === toyotaPlan.value) || toyotaPlans[0];

  if (!selectedPlan) {
    tableWrap.innerHTML = `<div class="empty">找不到 Toyota 方案</div>`;
    summary.innerHTML = "";
    return;
  }

  const loan = selectedPlan.amount;
  const months = selectedPlan.month;

  // 依你 Excel 內的設定
  const systemIRR = 0.04511;   // 實質IRR(系統)
  const dlrCap = 10080;        // DLR補貼款上限
  const hondaCap = 6720;       // 和泰補貼款上限
  const hondaShare = 0.4;      // 和泰補貼占比

  const monthlyPayment = loan / months;

  // C欄：總補貼款
  const totalSubsidy = roundToNearest(
    loan - pv(systemIRR / 12, months, monthlyPayment),
    100
  );

  // I欄：和泰補貼款
  const hondaSubsidy = Math.min(totalSubsidy * hondaShare, hondaCap);

  // D欄：DLR負擔
  const dlrBurden = totalSubsidy - hondaSubsidy;

  // H欄：最小DLR補貼
  const minDlrSubsidy = Math.min(dlrBurden, dlrCap);

  // F欄：最大月付款
  const maxMonthlyPayment =
    dlrBurden <= dlrCap
      ? monthlyPayment
      : roundUp(pmt(systemIRR / 12, months, -loan + minDlrSubsidy), 0);

  // G欄：客戶利率
  const customerRateAnnual = roundUp(
    rate(months, maxMonthlyPayment, -loan, 0, 0) * 12,
    5
  );

  projectHint.textContent = "Toyota零利率專案：依所選方案自動計算結果。";

  summary.innerHTML = `
    <div>Toyota方案：<strong>${selectedPlan.name}</strong></div>
    <div>貸款金額：<strong>${formatMoney(loan)}</strong></div>
    <div>期數：<strong>${months} 期</strong></div>
  `;

  renderTable(
    ["貸款金額", "月付款", "DLR負擔", "最大月付款", "客戶利率", "最小DLR補貼"],
    [[
      formatMoney(loan),
      formatMoney(monthlyPayment),
      formatMoney(dlrBurden),
      formatMoney(maxMonthlyPayment),
      formatPercent(customerRateAnnual * 100),
      formatMoney(minDlrSubsidy)
    ]]
  );
}
    function validateLoanWan(rawValue) {
      const wan = Number(rawValue);
      if (!isFinite(wan)) return { ok: false, msg: "請輸入數字。" };
      if (wan < 100 || wan > 500) {
        return { ok: false, msg: "貸款金額請輸入 100～500（萬元）之間。" };
      }
      return { ok: true, wan };
    }


    function calculate() {
      const projectKey = projectSelect.value;
      const selectedToyotaPlan = toyotaPlan.value;
      if(projectKey==="toyota"){

          calculateToyota();

          return;

      }
      let config = null;

      if(projectKey!="toyota"){

          config = getProjectConfig(projectKey);

      }
      const checked = validateLoanWan(amountWanInput.value);

      projectHint.textContent = config.hint;

      if (!checked.ok) {
        summary.innerHTML = "";
        setNotice(checked.msg, true);
        tableWrap.innerHTML = `<div class="empty">${checked.msg}</div>`;
        return;
      }

      setNotice("", false);

      const loanWan = checked.wan;
      const loan = Math.round(loanWan * 10000);

      summary.innerHTML = `
        <div>專案：<strong>${config.name}</strong></div>
        <div>實際貸款金額：<strong>${formatMoney(loan)}</strong></div>
      `;

      const rows = config.buildRows(loan);
      renderTable(config.headers, rows);
    }

function resetAll() {
  projectSelect.value = "haoxiang";
  toyotaArea.style.display = "none";
  amountWanInput.value = 100;
  calculate();
}


projectSelect.addEventListener("change", () => {
  if (projectSelect.value === "toyota") {
    toyotaArea.style.display = "block";
  } else {
    toyotaArea.style.display = "none";
  }
  calculate();
});

toyotaPlan.addEventListener("change", calculate);
    amountWanInput.addEventListener("input", calculate);
    calcBtn.addEventListener("click", calculate);
    resetBtn.addEventListener("click", resetAll);

    // 進入頁面先顯示第一版結果
    initToyotaPlans();

    calculate();
  </script>
