<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分期試算工具</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-weak: #eff6ff;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }

    .hero {
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .btn {
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease;
      white-space: nowrap;
      min-width: 110px;
    }

    .btn:hover { opacity: 0.95; }
    .btn:active { transform: translateY(1px); }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }

    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat .v {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .table-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    .table-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .table-head .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    thead th {
      background: var(--primary-weak);
      color: #1e3a8a;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      padding: 13px 12px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: #fafafa; }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .hero, .panel, .table-head { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>分期試算工具</h1>
      <p class="sub">先用最簡單、可上線的版本：使用者只要輸入「萬」為單位的貸款金額，再選擇專案，就會自動帶出各期別與佣金結果。</p>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="field">
          <label for="project">選擇專案</label>
          <select id="project">
            <option value="hao">豪享專案</option>
            <option value="le">樂享專案</option>
            <option value="gou">樂購專案</option>
            <option value="zhong">中古尊榮</option>
          </select>
        </div>

        <div class="field">
          <label for="amountWan">貸款金額（萬）</label>
          <input id="amountWan" type="number" min="0" step="0.01" placeholder="例如：100" value="100" />
        </div>

        <div class="field">
          <label for="rateSelect">利率</label>
          <select id="rateSelect"></select>
        </div>

        <button class="btn" id="calcBtn">立即試算</button>
      </div>
      <div class="note" id="projectNote"></div>
    </section>

    <section class="summary">
      <div class="stat">
        <div class="k">輸入金額</div>
        <div class="v" id="summaryAmount">$1,000,000</div>
      </div>
      <div class="stat">
        <div class="k">專案</div>
        <div class="v" id="summaryProject">豪享專案</div>
      </div>
      <div class="stat">
        <div class="k">利率</div>
        <div class="v" id="summaryRate">3.99%</div>
      </div>
      <div class="stat">
        <div class="k">佣金</div>
        <div class="v" id="summaryCommission">$8,000</div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-head">
        <h2 id="tableTitle">試算結果</h2>
        <div class="hint" id="tableHint">金額已以「萬」換算為實際貸款金額。</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="resultHead"></thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const projectSelect = document.getElementById('project');
    const amountWanInput = document.getElementById('amountWan');
    const rateSelect = document.getElementById('rateSelect');
    const calcBtn = document.getElementById('calcBtn');

    const summaryAmount = document.getElementById('summaryAmount');
    const summaryProject = document.getElementById('summaryProject');
    const summaryRate = document.getElementById('summaryRate');
    const summaryCommission = document.getElementById('summaryCommission');
    const projectNote = document.getElementById('projectNote');
    const tableTitle = document.getElementById('tableTitle');
    const resultHead = document.getElementById('resultHead');
    const resultBody = document.getElementById('resultBody');

    const rateOptions = {
      hao: [3.99, 4.25],
      le: [3.99, 4.25],
      gou: [3.99, 4.25],
      zhong: [4.50, 4.75, 5.00, 5.25, 5.50, 5.75]
    };

    const projectNames = {
      hao: '豪享專案',
      le: '樂享專案',
      gou: '樂購專案',
      zhong: '中古尊榮'
    };

    function money(n) {
      if (!isFinite(n)) return '-';
      return '$' + Math.round(n).toLocaleString('en-US');
    }

    function percent(n) {
      return n.toFixed(2) + '%';
    }

    function roundUpTo(value, unit) {
      return Math.ceil(value / unit) * unit;
    }

    function pmt(rate, nper, pv, fv = 0, type = 0) {
      if (Math.abs(rate) < 1e-12) {
        return (pv - fv) / nper;
      }
      const r1 = Math.pow(1 + rate, nper);
      return (rate * (pv * r1 - fv)) / ((1 + rate * type) * (r1 - 1));
    }

    function balanceAfterPayments(principal, monthlyRate, payments) {
      let bal = principal;
      for (const payment of payments) {
        bal = bal * (1 + monthlyRate) - payment;
      }
      return bal;
    }

    function commissionFor(project, rate, loan) {
      if (project === 'hao' || project === 'le') {
        if (rate === 3.99) return loan >= 1500000 ? 10000 : 8000;
        if (rate === 4.25) return 15000;
        return 0;
      }

      if (project === 'zhong') {
        if (loan < 1000000 || rate < 4.5) return 0;
        if (rate >= 4.75) return 15000;
        if (loan >= 1500000 && rate >= 4.5) return 10000;
        return 8000;
      }

      return 0;
    }

    function first12ForZhong(loan) {
      if (loan < 1000000 || loan > 5000000) return null;
      if (loan < 1600000) return 8888;
      if (loan < 2100000) return 12888;
      if (loan < 2600000) return 16888;
      if (loan < 3100000) return 20888;
      if (loan < 3600000) return 24888;
      if (loan < 4100000) return 28888;
      if (loan < 4600000) return 32888;
      return 36888;
    }

    function buildRateOptions() {
      const project = projectSelect.value;
      rateSelect.innerHTML = '';
      rateOptions[project].forEach((rate) => {
        const opt = document.createElement('option');
        opt.value = String(rate);
        opt.textContent = percent(rate);
        rateSelect.appendChild(opt);
      });
    }

    function updateProjectNote() {
      const project = projectSelect.value;
      if (project === 'hao') {
        projectNote.textContent = '豪享：固定 60 期。1~12 期固定 8888；13~24 期 = 貸款金額/100 + 888；25~59 期以前兩段付款推算；60 期為尾款 50%。';
      } else if (project === 'le') {
        projectNote.textContent = '樂享：固定 60 期。1~12 期固定 8888；13~59 期 = 貸款金額/100 + 888；60 期為最後一期清償金額。';
      } else if (project === 'gou') {
        projectNote.textContent = '樂購：固定 60 期。1~59 期固定為 貸款金額/100；60 期為最後一期清償金額。';
      } else {
        projectNote.textContent = '中古尊榮：利率較多種。1~12 期依貸款金額級距決定；13~24 期 = 貸款金額/100 + 888；25~59 期用前段與尾款回推，並以十位數無條件進位。';
      }
    }

    function updateSummary(loan, project, rate, commission) {
      summaryAmount.textContent = money(loan);
      summaryProject.textContent = projectNames[project];
      summaryRate.textContent = percent(rate);
      summaryCommission.textContent = money(commission);
    }

    function renderTable(project, loan, rate) {
      const monthlyRate = rate / 100 / 12;
      const commission = commissionFor(project, rate, loan);
      updateSummary(loan, project, rate, commission);

      if (project === 'hao') {
        tableTitle.textContent = '豪享專案試算結果';
        resultHead.innerHTML = `
          <tr>
            <th>分期金額</th>
            <th>期數</th>
            <th>1~12期</th>
            <th>13~24期</th>
            <th>25~59期</th>
            <th>尾款(50%)</th>
            <th>佣金</th>
            <th>客戶利率</th>
          </tr>
        `;

        const p1 = 8888;
        const p13 = loan / 100 + 888;
        const tail = loan * 0.5;
        const bal24 = balanceAfterPayments(loan, monthlyRate, Array(12).fill(p1).concat(Array(12).fill(p13)));
        const p25_59 = roundUpTo(pmt(monthlyRate, 35, bal24, tail / (1 + monthlyRate)), 1);

        resultBody.innerHTML = `
          <tr>
            <td>${money(loan)}</td>
            <td>60</td>
            <td>${money(p1)}</td>
            <td>${money(p13)}</td>
            <td>${money(p25_59)}</td>
            <td>${money(tail)}</td>
            <td>${money(commission)}</td>
            <td>${percent(rate)}</td>
          </tr>
        `;
        return;
      }

      if (project === 'le') {
        tableTitle.textContent = '樂享專案試算結果';
        resultHead.innerHTML = `
          <tr>
            <th>貸款金額</th>
            <th>期數</th>
            <th>1~12期</th>
            <th>13~59期</th>
            <th>60期</th>
            <th>佣金</th>
            <th>客戶利率</th>
          </tr>
        `;

        const p1 = 8888;
        const p13_59 = loan / 100 + 888;
        const bal59 = balanceAfterPayments(loan, monthlyRate, Array(12).fill(p1).concat(Array(47).fill(p13_59)));
        const p60 = roundUpTo(bal59 * (1 + monthlyRate), 1);

        resultBody.innerHTML = `
          <tr>
            <td>${money(loan)}</td>
            <td>60</td>
            <td>${money(p1)}</td>
            <td>${money(p13_59)}</td>
            <td>${money(p60)}</td>
            <td>${money(commission)}</td>
            <td>${percent(rate)}</td>
          </tr>
        `;
        return;
      }

      if (project === 'gou') {
        tableTitle.textContent = '樂購專案試算結果';
        resultHead.innerHTML = `
          <tr>
            <th>貸款金額</th>
            <th>期數</th>
            <th>1~59期</th>
            <th>60期</th>
            <th>佣金</th>
            <th>客戶利率</th>
          </tr>
        `;

        const p1_59 = loan / 100;
        const bal59 = balanceAfterPayments(loan, monthlyRate, Array(59).fill(p1_59));
        const p60 = roundUpTo(bal59 * (1 + monthlyRate), 1);

        resultBody.innerHTML = `
          <tr>
            <td>${money(loan)}</td>
            <td>60</td>
            <td>${money(p1_59)}</td>
            <td>${money(p60)}</td>
            <td>${money(commission)}</td>
            <td>${percent(rate)}</td>
          </tr>
        `;
        return;
      }

      // 中古尊榮
      tableTitle.textContent = '中古尊榮試算結果';
      resultHead.innerHTML = `
        <tr>
          <th>利率</th>
          <th>貸款金額</th>
          <th>1~12期</th>
          <th>13~24期</th>
          <th>25~59期</th>
          <th>尾款</th>
          <th>佣金</th>
        </tr>
      `;

      const p1 = first12ForZhong(loan);
      if (p1 === null) {
        resultBody.innerHTML = `
          <tr>
            <td colspan="7" class="error">貸款金額需介於 $1,000,000 ～ $5,000,000 才能使用中古尊榮專案。</td>
          </tr>
        `;
        return;
      }

      const p13 = loan / 100 + 888;
      const tail = loan * 0.5;
      const bal24 = balanceAfterPayments(loan, monthlyRate, Array(12).fill(p1).concat(Array(12).fill(p13)));
      const p25_59 = roundUpTo(pmt(monthlyRate, 35, bal24, tail / (1 + monthlyRate)), 10);

      resultBody.innerHTML = `
        <tr>
          <td>${percent(rate)}</td>
          <td>${money(loan)}</td>
          <td>${money(p1)}</td>
          <td>${money(p13)}</td>
          <td>${money(p25_59)}</td>
          <td>${money(tail)}</td>
          <td>${money(commission)}</td>
        </tr>
      `;
    }

    function recalc() {
      const project = projectSelect.value;
      const loanWan = Number(amountWanInput.value);
      const loan = Math.max(0, loanWan * 10000);
      const rate = Number(rateSelect.value || rateOptions[project][0]);
      renderTable(project, loan, rate);
    }

    projectSelect.addEventListener('change', () => {
      buildRateOptions();
      updateProjectNote();
      recalc();
    });

    rateSelect.addEventListener('change', recalc);
    amountWanInput.addEventListener('input', recalc);
    calcBtn.addEventListener('click', recalc);

    buildRateOptions();
    updateProjectNote();
    recalc();
  </script>
</body>
</html>
